<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
        <title>TuningHub Tracking Dashboard</title>
            <style>
                    body {
                                font-family: Arial;
                                            background: #0f0f0f;
                                                        color: #fff;
                                                                    padding: 25px;
                                                                            }
                                                                                    .grid {
                                                                                                display: grid;
                                                                                                            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                                                                                                                        gap: 20px;
                                                                                                                                }
                                                                                                                                        .card {
                                                                                                                                                    background: #1a1a1a;
                                                                                                                                                                padding: 20px;
                                                                                                                                                                            border-radius: 12px;
                                                                                                                                                                                        box-shadow: 0 0 10px rgba(0,0,0,0.4);
                                                                                                                                                                                                }
                                                                                                                                                                                                        .value {
                                                                                                                                                                                                                    font-size: 42px;
                                                                                                                                                                                                                                font-weight: bold;
                                                                                                                                                                                                                                            margin-top: 10px;
                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                        </head>
                                                                                                                                                                                                                                                        <body>

                                                                                                                                                                                                                                                        <h1>TuningHub – Tracking Dashboard</h1>

                                                                                                                                                                                                                                                        <div class="grid">
                                                                                                                                                                                                                                                            <div class="card">
                                                                                                                                                                                                                                                                    <h2>Seitenaufrufe – Woche</h2>
                                                                                                                                                                                                                                                                            <div class="value" id="viewsWeek">0</div>
                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                    <div class="card">
                                                                                                                                                                                                                                                                                            <h2>Seitenaufrufe – Monat</h2>
                                                                                                                                                                                                                                                                                                    <div class="value" id="viewsMonth">0</div>
                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                            <div class="card">
                                                                                                                                                                                                                                                                                                                    <h2>Logins – Woche</h2>
                                                                                                                                                                                                                                                                                                                            <div class="value" id="loginsWeek">0</div>
                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                    <div class="card">
                                                                                                                                                                                                                                                                                                                                            <h2>Logins – Monat</h2>
                                                                                                                                                                                                                                                                                                                                                    <div class="value" id="loginsMonth">0</div>
                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
                                                                                                                                                                                                                                                                                                                                                        <script>

                                                                                                                                                                                                                                                                                                                                                        const supabase = Supabase.createClient(
                                                                                                                                                                                                                                                                                                                                                            "https://lhxcnrogjjskgaclqxtm.supabase.co",
                                                                                                                                                                                                                                                                                                                                                                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxoeGNucm9nampza2dhY2xxeHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI1MjU0MzUsImV4cCI6MjA2ODEwMTQzNX0.vOr_Esi9IIesFixkkvYQjYEqghrKCMeqbrPKW27zqww"
                                                                                                                                                                                                                                                                                                                                                                );

                                                                                                                                                                                                                                                                                                                                                                // ===========================================
                                                                                                                                                                                                                                                                                                                                                                // 100 % KORREKTE EVENTAUSWERTUNG
                                                                                                                                                                                                                                                                                                                                                                // ===========================================
                                                                                                                                                                                                                                                                                                                                                                async function countEvents(eventName) {

                                                                                                                                                                                                                                                                                                                                                                    // Alle Events abrufen
                                                                                                                                                                                                                                                                                                                                                                        const { data, error } = await supabase
                                                                                                                                                                                                                                                                                                                                                                                .from("tracking_events")
                                                                                                                                                                                                                                                                                                                                                                                        .select("event_type, timestamp");

                                                                                                                                                                                                                                                                                                                                                                                            if (error) {
                                                                                                                                                                                                                                                                                                                                                                                                    console.error("Supabase Error:", error);
                                                                                                                                                                                                                                                                                                                                                                                                            return { week: 0, month: 0 };
                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                    const now = new Date();

                                                                                                                                                                                                                                                                                                                                                                                                                        // Wochenstart → Montag 00:00
                                                                                                                                                                                                                                                                                                                                                                                                                            const weekStart = new Date(now);
                                                                                                                                                                                                                                                                                                                                                                                                                                weekStart.setHours(0,0,0,0);
                                                                                                                                                                                                                                                                                                                                                                                                                                    const day = (now.getDay() + 6) % 7; // Montag = 0
                                                                                                                                                                                                                                                                                                                                                                                                                                        weekStart.setDate(now.getDate() - day);

                                                                                                                                                                                                                                                                                                                                                                                                                                            // Monatsstart → Erster Tag 00:00
                                                                                                                                                                                                                                                                                                                                                                                                                                                const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

                                                                                                                                                                                                                                                                                                                                                                                                                                                    let weekly = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                        let monthly = 0;

                                                                                                                                                                                                                                                                                                                                                                                                                                                            data.forEach(r => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (r.event_type !== eventName) return;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const t = new Date(r.timestamp);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (t >= weekStart) weekly++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (t >= monthStart) monthly++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    return { week: weekly, month: monthly };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // ===========================================
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // DASHBOARD UPDATEN
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // ===========================================
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    async function updateDashboard() {

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const views = await countEvents("page_view");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const logins = await countEvents("login");

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("viewsWeek").innerText = views.week;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById("viewsMonth").innerText = views.month;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById("loginsWeek").innerText = logins.week;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById("loginsMonth").innerText = logins.month;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            updateDashboard();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
